<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN Comtrade Analytics — Geopolitical Metabolism</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <header class="app-header">
        <h1>UN Comtrade Analytical Platform</h1>
        <div class="header-controls">
            <input type="file" id="file-input" accept=".csv" style="display:none">
            <button onclick="document.getElementById('file-input').click()">🔄 Upload Data</button>
            <button id="theme-toggle-btn">🌙</button>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar-filters">
            <h2>Parameters</h2>
            <label>Research Phase</label>
            <select id="filter-phase" class="filter-input">
                <option value="ALL">All Phases</option>
                <option value="PHASE1">Phase 1: Macro</option>
                <option value="PHASE2">Phase 2: Micro Extraction</option>
                <option value="PHASE3A">Phase 3A: Batteries</option>
                <option value="PHASE3B">Phase 3B: EVs</option>
            </select>
            <button id="reset-filters-btn">Reset</button>
        </aside>

        <main class="main-content">
            <div id="sankey-zoom-wrapper" style="width:100%; height: 600px; overflow: hidden; cursor: grab; background: #fff; border: 1px solid #ccc; position: relative;">
                <div id="sankey-chart" style="width: 100%; height: 100%;"></div>
            </div>
            <div class="zoom-controls">
                <button id="zoom-in">+</button>
                <button id="zoom-out">-</button>
                <button id="zoom-reset">Reset</button>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
