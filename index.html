<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Diagrama de Sankey - Google Charts</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript">
    // Carregar o pacote Sankey
    google.charts.load('current', {'packages':['sankey']});
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      // 2. Definir a estrutura de dados (Origem -> Destino -> Valor)
      var data = new google.visualization.DataTable();
      data.addColumn('string', 'Origem');
      data.addColumn('string', 'Destino');
      data.addColumn('number', 'Valor (€)');

      // Adicionar as linhas de fluxo
      data.addRows([
        // Nível 1: Origem da Receita para Departamentos
        [ 'Vendas de Software', 'Investimento e I&D', 50000 ],
        [ 'Vendas de Software', 'Operações e Marketing', 30000 ],
        [ 'Consultoria e Serviços', 'Investimento e I&D', 15000 ],
        [ 'Consultoria e Serviços', 'Operações e Marketing', 25000 ],
        [ 'Consultoria e Serviços', 'Reserva Financeira', 10000 ],

        // Nível 2: Departamentos para Custos Específicos
        [ 'Investimento e I&D', 'Salários de Engenharia', 45000 ],
        [ 'Investimento e I&D', 'Infraestrutura de Servidores', 20000 ],
        [ 'Operações e Marketing', 'Publicidade Digital', 30000 ],
        [ 'Operações e Marketing', 'Logística e Escritórios', 25000 ]
      ]);

      // 3. Configurar as opções visuais
      var options = {
        width: 800,
        height: 500,
        sankey: {
          node: {
            label: { 
              fontName: 'Helvetica, Arial, sans-serif', 
              fontSize: 14, 
              color: '#333333',
              bold: true 
            },
            nodePadding: 30, // Espaço vertical entre os nós
            width: 20,       // Espessura do bloco do nó
            colors: ['#1f77b4', '#aec7e8', '#ff7f0e', '#ffbb78', '#2ca02c']
          },
          link: {
            colorMode: 'gradient', // Opções: 'source', 'target', 'gradient'
            color: { fillOpacity: 0.6 }
          }
        }
      };

      // 4. Instanciar e desenhar o gráfico no contentor HTML
      var chart = new google.visualization.Sankey(document.getElementById('sankey_chart'));
      chart.draw(data, options);
    }
  </script>
  <style>
    body {
      font-family: 'Helvetica, Arial, sans-serif';
      margin: 40px;
      background-color: #f9f9f9;
    }
    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: inline-block;
    }
  </style>
</head>
<body>

  <h2>Fluxo de Alocação de Capital</h2>
  <p>Representação visual da distribuição de receitas utilizando o Google Charts Sankey.</p>
  
  <div class="chart-container">
    <div id="sankey_chart" style="width: 800px; height: 500px;"></div>
  </div>

</body>
</html>
